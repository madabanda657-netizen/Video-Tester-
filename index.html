<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click to Watch</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #0b0f19;
        background: linear-gradient(180deg, #0b0f19 0%, #111827 100%);
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    main {
        width: 100%;
        max-width: 480px;
        text-align: center;
        padding: 40px 24px;
    }
    h1 {
        font-size: clamp(2rem, 6vw, 2.75rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 12px;
        color: #f9fafb;
    }
    .subtitle {
        color: #9ca3af;
        font-size: 1rem;
        margin-bottom: 40px;
        line-height: 1.5;
    }
    #watchBtn {
        background: #22c55e;
        color: white;
        border: none;
        padding: 20px 48px;
        font-size: 1.25rem;
        font-weight: 600;
        border-radius: 16px;
        cursor: pointer;
        width: 100%;
        max-width: 300px;
        box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.3), 0 4px 10px -2px rgba(34, 197, 94, 0.2);
        transition: all 0.2s ease;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        overflow: hidden;
    }
    #watchBtn:hover {
        background: #16a34a;
        transform: translateY(-2px);
        box-shadow: 0 15px 30px -5px rgba(34, 197, 94, 0.4), 0 6px 12px -2px rgba(34, 197, 94, 0.3);
    }
    #watchBtn:active {
        transform: translateY(0);
        box-shadow: 0 5px 15px -5px rgba(34, 197, 94, 0.3);
    }
    #watchBtn:disabled {
        background: #374151;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        opacity: 0.7;
    }
    #status {
        margin-top: 24px;
        min-height: 24px;
        color: #9ca3af;
        font-size: 0.9rem;
    }
    .icon {
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
    }
    #videoContainer {
        display: none;
        margin-top: 32px;
    }
    .video-wrap {
        opacity: 0;
        transform: translateY(12px);
        transition: all 0.4s ease;
    }
    .video-wrap.show {
        opacity: 1;
        transform: translateY(0);
    }
    .video-placeholder {
        position: relative;
        background: #000;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.08);
    }
    .video-placeholder video {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 9;
        background: #000;
    }
    .video-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #e5e7eb;
        font-size: 0.95rem;
        background: rgba(17,24,39,0.8);
        padding: 10px 16px;
        border-radius: 10px;
        pointer-events: none;
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255,255,255,0.1);
        white-space: nowrap;
    }
    .note {
        margin-top: 48px;
        color: #6b7280;
        font-size: 0.8rem;
        line-height: 1.5;
        padding: 0 8px;
    }
    @media (max-width: 390px) {
        main {
            padding: 32px 16px;
        }
        h1 {
            margin-bottom: 10px;
        }
        #watchBtn {
            padding: 18px 36px;
            font-size: 1.125rem;
            max-width: none;
        }
        .video-text {
            font-size: 0.85rem;
            padding: 8px 12px;
        }
    }
</style>
</head>
<body>
    <main>
        <h1>Click to Watch</h1>
        <p class="subtitle">Tap the button below to continue</p>
        <button id="watchBtn" aria-label="Watch Now">
            <span class="icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: -3px;">
                    <path d="M8 5.14v14l11-7-11-7z"/>
                </svg>
            </span>
            Watch Now
        </button>
        <p id="status"></p>

        <div id="videoContainer" class="video-wrap">
            <div class="video-placeholder">
                <video controls playsinline poster="">
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <p class="video-text">Your video will play here</p>
            </div>
        </div>

        <p class="note">If ad doesn't appear, host this file on HTTPS (GitHub Pages) – ads don't work on file://</p>
    </main>

<script>
    (function() {
        const btn = document.getElementById('watchBtn');
        const status = document.getElementById('status');
        const videoContainer = document.getElementById('videoContainer');
        let scriptLoaded = false;

        function showVideo() {
            videoContainer.style.display = 'block';
            setTimeout(() => {
                videoContainer.classList.add('show');
            }, 10);
        }

        btn.addEventListener('click', function() {
            if (scriptLoaded) {
                showVideo();
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = 'Loading Ad...';
            status.textContent = '';

            const socialBarUrl = 'https://pl29281398.effectivecpmnetwork.com/29/5a/a8/295aa8c04e3cb528d2b04a0d06b737fa.js';

            try {
                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.async = true;
                script.src = socialBarUrl;

                script.onload = function() {
                    scriptLoaded = true;
                    btn.disabled = false;
                    btn.innerHTML = '<span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: -3px;"><path d="M8 5.14v14l11-7-11-7z"/></svg></span>Watch Video';
                    status.textContent = '';
                    showVideo();
                };

                script.onerror = function() {
                    status.textContent = 'Failed to load. Please check your connection and try again.';
                    btn.innerHTML = '<span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: -3px;"><path d="M8 5.14v14l11-7-11-7z"/></svg></span>Try Again';
                    btn.disabled = false;
                };

                document.body.appendChild(script);

            } catch (e) {
                status.textContent = 'Error loading ad.';
                btn.disabled = false;
                btn.innerHTML = '<span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: -3px;"><path d="M8 5.14v14l11-7-11-7z"/></svg></span>Watch Now';
            }
        });
    })();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
